; =====================================================================
; skyrim_render_clean configuration
; =====================================================================
;
; This mod adds CPU-side optimizations to Skyrim Special Edition's
; rendering pipeline. It does not modify any game settings - your
; Skyrim.ini and SkyrimPrefs.ini control LOD distances, shadow
; quality, etc., as normal.
;
; Compatible with: ENB, ReShade, DXVK, SKSE, all visual mods.
;
; This file is also auto-generated at runtime if missing.
;

; =====================================================================
; HOW TO COMPARE MOD-ON VS MOD-OFF
; =====================================================================
; 1. Set [Profiling] Enabled=true
; 2. Set [Master] Enabled=true. Play 60s in a fixed spot.
;    Rename skyrim_render_clean.log to mod_on.log.
; 3. Set [Master] Enabled=false. Restart Skyrim. Same spot, 60s.
;    The log is now your vanilla baseline.
; 4. Compare the avg/p50/p95/p99 values from the two logs.
;
; The DLL is the same in both runs - only the INI changed.
; =====================================================================

[Master]
; *** MASTER KILL SWITCH ***
;
; When false, ALL optimizations are skipped - the DLL behaves like a
; pass-through. Profiling/logging still runs if enabled.
Enabled=true


[Profiling]
; Set true to write skyrim_render_clean.log with frame timing every
; 30 seconds. Set false for normal play (no log file written).
Enabled=false

; Stutter detection: when an individual frame takes longer than
; this many milliseconds, log a SPIKE event. 0 disables.
StutterThresholdMs=25

; Cap on how many SPIKE lines per 30s window.
MaxSpikesPerWindow=200

; Hotspot profiling: hook a fixed list of TESV.exe subroutines and
; count how often each is called per 30s window. Output goes to a
; separate file (skyrim_render_clean_hotspots.log). Used to identify
; which functions are worth optimizing in future builds.
;
; Adds 1-3% overhead to hot-path frames. OFF for normal play.
HotspotProfiling=false

; A/B test mode. When true, the engine cache hooks (the biggest single
; perf contributor) alternate ON/OFF every 30 seconds within one session.
; Each log window is tagged [MOD-ON] or [MOD-OFF] for direct comparison.
;
; Use case: stand in a fixed spot, run for 5+ minutes, then compare
; avg/p50/p95 frame times across MOD-ON vs MOD-OFF windows. Same scene,
; same engine state - eliminates cross-session variance.
;
; Requires Master.Enabled=true above (the hooks need to be installed
; to be toggled). Other optimizations (matrix math, device state cache)
; stay on; only the engine cache hooks toggle.
ABTestMode=false
